services:
  postgres:
    image: postgres:16-alpine
    container_name: gestionspa-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestionspa
    ports:
      - "5432:5432"
    volumes:
      - gestionspa_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestionspa"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/GestionSpa.Api
      dockerfile: Dockerfile
    container_name: gestionspa-api
    ports:
      - "5000:8080"
    environment:
      PORT: 8080
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gestionspa
      FRONTEND_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: gestionspa-web
    ports:
      - "5173:8080"
    environment:
      PORT: 8080
    depends_on:
      - api

volumes:
  gestionspa_data:
